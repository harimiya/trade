name: Daily Stock Signal

on:
  schedule:
    - cron: '0 0 * * *' # 毎日日本時間 9:00 (UTC 0:00) に実行
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas matplotlib scipy

      - name: Run strategy
        # ここで Python ファイル名を正確に指定します
        run: python japan_us_leadlag_strategy.py

      - name: Post Dashboard to Discord
        # 生成された画像(leadlag_signal_dashboard.png)をWebhook経由で送信します
        if: always() # 計算が成功した場合にのみ実行
        run: |
          curl -X POST -F "file=@leadlag_signal_dashboard.png" \
               -F "payload_json={\"content\": \"📈 本日の日米業種リードラグ・シグナルを更新しました\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
