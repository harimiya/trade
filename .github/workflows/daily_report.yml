name: Daily Stock Signal

on:
  schedule:
    - cron: '0 0 * * *' # 毎日日本時間 9:00 (UTC 0:00)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas matplotlib scipy

      - name: Run strategy
        run: |
          # 確実に japan_us_leadlag_strategy.py という名前で実行
          python japan_us_leadlag_strategy.py
          ls -R # 生成されたファイルを確認

      - name: Post to Discord
        if: always()
        run: |
          if [ -f "leadlag_signal_dashboard.png" ]; then
            curl -X POST -F "file=@leadlag_signal_dashboard.png" \
                 -F "payload_json={\"content\": \"📈 シグナルを更新しました\"}" \
                 ${{ secrets.DISCORD_WEBHOOK_URL }}
          else
            echo "Error: Image not found. Check Python logs."
            exit 1
          fi
