name: Daily Stock Signal

on:
  schedule:
    - cron: '0 0 * * *' # 毎日日本時間 9:00 (UTC 0:00) に実行
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance numpy pandas matplotlib scipy

      - name: Run strategy
        # 1. スクリプトを実行
        # 2. 終了後にファイル一覧を表示して画像の存在を確認
        run: |
          python japan_us_leadlag_strategy.py
          echo "--- Generated Files ---"
          ls -lh *.png || echo "No PNG files found."

      - name: Post Dashboard to Discord
        # 前のステップが成功した場合のみ実行
        if: success()
        run: |
          if [ -f "leadlag_signal_dashboard.png" ]; then
            curl -X POST \
              -F "file=@./leadlag_signal_dashboard.png" \
              -F "payload_json={\"content\": \"📈 **日米業種リードラグ・シグナル更新**\n生成日: $(date +'%Y-%m-%d')\"}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          else
            echo "Error: leadlag_signal_dashboard.png not found."
            exit 1
          fi
