name: 📡 入札落札シグナル — 毎朝スキャン

on:
  schedule:
    - cron: "0 18 * * *"   # 毎日 JST 03:00（= UTC 前日 18:00）

  workflow_dispatch:       # 手動実行も可能

env:
  TZ: Asia/Tokyo
  PYTHON_VERSION: "3.11"

# ★ この2行で 403 エラーを解消
permissions:
  contents: write
  actions:  read

jobs:
  scan:
    name: "スキャン → シグナル生成 → Discord 通知"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps
        continue-on-error: true   # 失敗しても requests で動作継続

      - name: Restore seen_ids cache
        uses: actions/cache@v4
        with:
          path: data/seen_ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: seen-ids-

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/scraper.py

      - name: Commit & push signals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/ data/seen_ids.json 2>/dev/null || true
          git diff --staged --quiet && echo "変更なし" && exit 0
          TODAY=$(date '+%Y-%m-%d')
          COUNT=$(python -c "
          import json,glob
          fs=sorted(glob.glob('signals/*.json'))
          print(len(json.load(open(fs[-1]))) if fs else 0)
          " 2>/dev/null || echo 0)
          git commit -m "🔔 ${TODAY}: ${COUNT}件のシグナル [bot]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_id }}
          path: signals/*.json
          retention-days: 90
