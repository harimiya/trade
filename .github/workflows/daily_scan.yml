name: 📡 入札落札シグナル — 毎朝スキャン

on:
  schedule:
    - cron: "0 18 * * *"   # JST 03:00 (= UTC 18:00 前日)

  workflow_dispatch:
    inputs:
      nikoukei_pages:
        description: "nikoukei ページ数 (1-67)"
        default: "67"
        required: false
      nsearch_days:
        description: "nsearch 直近日数"
        default: "7"
        required: false
      quick:
        description: "クイックテスト (3ページ)"
        default: "false"
        type: choice
        options: ["false", "true"]
        required: false

env:
  TZ: Asia/Tokyo
  PYTHON_VERSION: "3.11"

jobs:
  scan:
    name: "入札結果スキャン & シグナル生成"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Restore seen_ids cache
        uses: actions/cache@v4
        with:
          path: data/seen_ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: seen-ids-

      - name: Run scraper
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.inputs.quick }}" = "true" ]; then
            python src/scraper.py --quick
          else
            python src/scraper.py \
              --nikoukei-pages "${{ github.event.inputs.nikoukei_pages || '67' }}" \
              --nsearch-days   "${{ github.event.inputs.nsearch_days   || '7'  }}"
          fi

      - name: Commit signals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/ data/seen_ids.json data/nsearch_delta.json 2>/dev/null || true
          git diff --staged --quiet && exit 0
          TODAY=$(date '+%Y-%m-%d')
          COUNT=$(python -c "
          import json,glob
          fs=sorted(glob.glob('signals/*.json'))
          print(len(json.load(open(fs[-1]))) if fs else 0)
          " 2>/dev/null || echo 0)
          git commit -m "🔔 ${TODAY}: ${COUNT}件のシグナル [bot]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_id }}
          path: signals/*.json
          retention-days: 90

      - name: Job summary
        if: always()
        run: |
          echo "## 📡 スキャン結果 $(date '+%Y-%m-%d %H:%M JST')" >> $GITHUB_STEP_SUMMARY
          python - >> $GITHUB_STEP_SUMMARY << 'EOF'
          import json, glob
          files = sorted(glob.glob("signals/*.json"))
          if not files:
              print("シグナルなし"); exit()
          data = json.load(open(files[-1]))
          print(f"**{len(data)} 件のシグナル**\n")
          print("| ソース | ロール | 銘柄 | 企業 | 落札者 | 案件 |")
          print("|--------|--------|------|------|--------|------|")
          for s in data:
              role = "自社" if s.get("ticker_role")=="self" else "親会社"
              print(f"| {s.get('source','')} | {role} | {s.get('ticker','')} | {s.get('company','')} | {s.get('winner','')} | {s.get('project_name','')[:30]} |")
          EOF
