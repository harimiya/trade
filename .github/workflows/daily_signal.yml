name: Daily Stock Signal

on:
  schedule:
    - cron: '0 0 * * *' # 日本時間 9:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas matplotlib scipy

      - name: Run strategy
        run: |
          # 実行ファイル名は japan_us_leadlag_strategy.py とします
          python japan_us_leadlag_strategy.py

      - name: Post to Discord
        if: success()
        run: |
          if [ -f "leadlag_signal_dashboard.png" ]; then
            curl -X POST -F "file=@./leadlag_signal_dashboard.png" \
                 -F "payload_json={\"content\": \"📈 **日米業種リードラグ・シグナルを更新しました**\"}" \
                 ${{ secrets.DISCORD_WEBHOOK_URL }}
          else
            echo "Error: Image not found."
            exit 1
          fi
