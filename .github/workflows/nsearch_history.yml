name: 📚 nsearch.jp — 5年分 履歴スクレイピング（初回のみ手動実行）

on:
  workflow_dispatch:
    inputs:
      years:
        description: "遡る年数（推奨: 5）"
        default: "5"
        required: false
      run_backtest:
        description: "取得後にバックテストも実行"
        type: choice
        options: ["true", "false"]
        default: "true"
        required: false

env:
  TZ: Asia/Tokyo
  PYTHON_VERSION: "3.11"

jobs:
  history:
    name: "nsearch 履歴一括取得"
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最大 6 時間

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Restore existing history cache
        uses: actions/cache@v4
        with:
          path: data/nsearch_*.json
          key: nsearch-history-${{ github.run_id }}
          restore-keys: nsearch-history-

      - name: Scrape nsearch history
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          YEARS="${{ github.event.inputs.years || '5' }}"
          echo "=== nsearch.jp 過去 ${YEARS} 年分 スクレイピング開始 ==="
          python src/nsearch_scraper.py --mode history --years ${YEARS}

          echo "--- 取得件数 ---"
          python - << 'EOF'
          import json, glob
          total = 0
          for f in sorted(glob.glob("data/nsearch_2*.json")):
              try:
                  n = len(json.load(open(f)))
                  print(f"  {f}: {n} 件")
                  total += n
              except: pass
          print(f"  合計: {total} 件")
          EOF

      - name: Commit history data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nsearch_*.json 2>/dev/null || true
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "📚 nsearch 5年分 履歴データ追加 [bot]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nsearch-history-${{ github.run_id }}
          path: data/nsearch_*.json
          retention-days: 365
