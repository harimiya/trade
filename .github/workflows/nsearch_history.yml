name: 📚 nsearch.jp — 5年分 履歴スクレイピング（初回のみ）

on:
  workflow_dispatch:
    inputs:
      years:
        description: "遡る年数"
        default: "5"
        required: false
      run_backtest:
        description: "取得後にバックテストも実行する"
        default: "true"
        type: choice
        options: ["true", "false"]
        required: false

env:
  TZ: Asia/Tokyo
  PYTHON_VERSION: "3.11"

jobs:
  historical-scrape:
    name: "nsearch 5年分 履歴取得"
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最大6時間（大量ページのため余裕を持たせる）

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # ── 年別に取得（1年分ずつ保存してキャッシュ活用）──
      - name: Restore existing history cache
        uses: actions/cache@v4
        with:
          path: data/nsearch_*.json
          key: nsearch-history-${{ github.run_id }}
          restore-keys: nsearch-history-

      - name: Scrape nsearch history
        run: |
          YEARS="${{ github.event.inputs.years || '5' }}"
          echo "=== nsearch.jp 過去${YEARS}年分 スクレイピング開始 ==="
          python src/nsearch_scraper.py --mode history --years ${YEARS}
          echo "=== スクレイピング完了 ==="

          echo "--- 取得件数サマリー ---"
          python - << 'EOF'
          import json, glob, os
          total = 0
          for f in sorted(glob.glob("data/nsearch_*.json")):
              if "delta" in f: continue
              try:
                  data = json.load(open(f))
                  print(f"  {os.path.basename(f)}: {len(data)} 件")
                  total += len(data)
              except: pass
          print(f"  合計: {total} 件")
          EOF

      - name: Run backtest (optional)
        if: github.event.inputs.run_backtest == 'true'
        run: |
          echo "=== バックテスト実行 ==="
          python backtest/backtest_sim.py
          echo "=== バックテスト完了 ==="

      - name: Commit history data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nsearch_*.json backtest_results/ 2>/dev/null || true
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "📚 nsearch 履歴データ更新 [bot]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload history artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nsearch-history-${{ github.run_id }}
          path: |
            data/nsearch_*.json
            backtest_results/
          retention-days: 365

      - name: Job summary
        if: always()
        run: |
          echo "## 📚 nsearch 履歴スクレイピング結果" >> $GITHUB_STEP_SUMMARY
          python - >> $GITHUB_STEP_SUMMARY << 'EOF'
          import json, glob
          total = 0
          print("| ファイル | 件数 |")
          print("|----------|------|")
          for f in sorted(glob.glob("data/nsearch_*.json")):
              if "delta" in f: continue
              try:
                  n = len(json.load(open(f)))
                  print(f"| {f} | {n} |")
                  total += n
              except: pass
          print(f"\n**合計 {total} 件**")
          EOF
