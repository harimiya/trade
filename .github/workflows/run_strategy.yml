name: Lead-Lag Strategy Daily Run

on:
  schedule:
    # 日本時間 午前10:00 (01:00 UTC) に自動実行
    - cron: '0 1 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Git Pushを許可するために必要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4に更新

      - name: Set up Python
        uses: actions/setup-python@v5 # v5に更新
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance numpy pandas matplotlib

      - name: Run strategy script
        run: python japan_us_leadlag_strategy.py

      - name: Check for generated image
        id: check_file
        run: |
          if [ -f "leadlag_signal_dashboard.png" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # エラーが出ていた箇所を v4 に更新
      - name: Upload result image
        if: steps.check_file.outputs.exists == 'true'
        uses: actions/upload-artifact@v4 # v4に更新
        with:
          name: strategy-dashboard-${{ github.run_id }} # 重複エラーを避けるため実行IDを付与
          path: leadlag_signal_dashboard.png
          retention-days: 7 # 7日間保持

      - name: Commit and push if changed
        if: steps.check_file.outputs.exists == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add leadlag_signal_dashboard.png
          git commit -m "Update daily strategy dashboard [skip ci]" || exit 0
          git push
