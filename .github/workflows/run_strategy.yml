name: Lead-Lag Strategy Daily Run

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance numpy pandas matplotlib

      - name: Run strategy script
        run: python japan_us_leadlag_strategy.py

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -f "discord_msg.txt" ]; then
            MESSAGE=$(cat discord_msg.txt)
            curl -X POST -H "Content-Type: multipart/form-data" \
                 -F "content=$MESSAGE" \
                 -F "file=@leadlag_signal_dashboard.png" \
                 "$DISCORD_WEBHOOK"
          fi

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add leadlag_signal_dashboard.png
          git commit -m "Update daily dashboard [skip ci]" || exit 0
          git push
