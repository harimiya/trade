name: Lead-Lag Strategy Daily Run

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance numpy pandas matplotlib

      - name: Run strategy script
        run: python japan_us_leadlag_strategy.py

      - name: Check for generated image
        id: check_file
        run: |
          if [ -f "leadlag_signal_dashboard.png" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Discordへの通知ステップを追加
      - name: Send Discord Notification
        if: steps.check_file.outputs.exists == 'true'
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: multipart/form-data" \
               -F "content=🚀 **日米リードラグ投資戦略レポート**\n生成が完了しました。最新のシグナルを確認してください。" \
               -F "file=@leadlag_signal_dashboard.png" \
               $WEBHOOK_URL

      - name: Commit and push if changed
        if: steps.check_file.outputs.exists == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add leadlag_signal_dashboard.png
          git commit -m "Update daily strategy dashboard [skip ci]" || exit 0
          git push
